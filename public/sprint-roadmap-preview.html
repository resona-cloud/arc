<!DOCTYPE html>
<html lang="en">
<head>
<script>
window.ARC_CONFIG_READY = fetch('/api/config').then(function(r){return r.json();}).then(function(cfg){
  window.ARC_CONFIG = cfg;
  var _fetch = window.fetch;
  window.fetch = function(url, opts) {
    if (typeof url === 'string' && url.indexOf('/api/') === 0 && url.indexOf('/api/config') !== 0) {
      opts = Object.assign({}, opts);
      opts.headers = Object.assign({}, opts.headers, {'x-arc-key': (cfg && cfg.apiKey) || ''});
    }
    return _fetch.call(this, url, opts);
  };
  return cfg;
}).catch(function(){ window.ARC_CONFIG = {}; });
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>3PR Preview — ARC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0a0a0f;
      --surface:  #13131a;
      --surface2: #1a1a24;
      --border:   #2a2a3a;
      --accent:   #00d4aa;
      --accent2:  #0066ff;
      --text:     #f0f0f0;
      --muted:    #8888a0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 64px;
    }

    /* ── Page header ── */
    .preview-header {
      width: 100%;
      max-width: 680px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
    }
    .preview-wordmark {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -.02em;
      color: var(--text);
    }
    .preview-wordmark span { color: var(--accent); }
    .preview-badge {
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(0,212,170,.35);
      border-radius: 4px;
      padding: 2px 7px;
      margin-left: 4px;
    }
    .preview-sep {
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .preview-meta {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: .08em;
    }

    /* ── Section title ── */
    .section-title {
      width: 100%;
      max-width: 680px;
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .section-sub {
      width: 100%;
      max-width: 680px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    /* ── Variant switcher ── */
    .variant-bar {
      width: 100%;
      max-width: 680px;
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .variant-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: .06em;
      text-transform: uppercase;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .variant-btn:hover,
    .variant-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Component wrapper ── */
    .component-frame {
      width: 100%;
      max-width: 680px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
    }
  </style>
</head>

    function setVariant(key) {
      document.querySelectorAll('.variant-btn').forEach(function (b) {
        b.classList.toggle('active', b.getAttribute('onclick').includes("'" + key + "'"));
      });
      renderComponent(key);
    }

    function renderComponent(key) {
      var data = VARIANTS[key];
      window.arcSprintData = data;

      fetch('/components/three-point-roadmap.html')
        .then(function (r) { return r.text(); })
        .then(function (html) {
          var frame = document.getElementById('component-frame');
          frame.innerHTML = html;
          frame.querySelectorAll('script').forEach(function (old) {
            var s = document.createElement('script');
            s.textContent = old.textContent;
            document.body.appendChild(s);
          });
        })
        .catch(function () {
          document.getElementById('component-frame').innerHTML =
            '<p style="color:var(--muted);font-size:12px;padding:16px">Open via a local server — file:// fetch is blocked.<br>Try: <code>npx serve ~/arc/public</code></p>';
        });
